; Elder Care Stick — Sensor Test Firmware
; Board: ESP32-S3 SuperMini (USB CDC native)

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Board nay la bien the FLASH 4MB (khong phai 8MB nhu preset) ---
; Phai khai bao dung 4MB neu khong chip boot-loop (assert flash_ret).
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv

; --- Cong serial ---
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200

; --- USB-Serial/JTAG (cong USB-C truc tiep tren chip S3) ---
; Cong COM9 la USB-Serial/JTAG peripheral (VID:PID 303A:1001, giu nguyen qua moi reset).
; USB_MODE=1     -> dung USB-Serial/JTAG (HWCDC), khong dung TinyUSB.
; CDC_ON_BOOT=1  -> core TU DONG bat USB stack khi boot va dinh tuyen `Serial` = HWCDC,
;                   nho do `Serial.print` ra thang COM9. (Voi =0, `Serial` la UART0 vat ly.)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Thu vien ---
lib_deps =
    electroniccats/MPU6050 @ ^1.3.1
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
